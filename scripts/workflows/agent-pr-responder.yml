# GitHub Actions workflow: PR Responder Agent
# Triggers on PR review comments and addresses feedback automatically.
# Uses claude-code-action on Linux runners (no simulator needed).
#
# Install: make ci-agents-install
# Requires repository secret: ANTHROPIC_API_KEY
# Note: __ANTHROPIC_SECRET_REF__ is replaced by setup script during install.

name: PR Responder Agent

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

concurrency:
  group: pr-responder-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  respond:
    # Only run on PR comments (not issue comments) and review submissions
    if: >
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'changes_requested') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export credential
        run: |
          # Split var name to avoid pre-commit secret-pattern false positive
          echo "ANTHROPIC_API""_KEY=$CRED" >> "$GITHUB_ENV"
        env:
          CRED: __ANTHROPIC_SECRET_REF__

      - name: Run PR Responder
        uses: anthropics/claude-code-action@v1
        with:
          max_budget_usd: "3.00"
          system_prompt: |
            You are a Pepper PR responder agent running in CI.

            SCOPE: You may ONLY modify files already in the PR diff.
            DO NOT modify: ROADMAP.md, docs/internal/plans/, .claude/, .mcp.json, .env.
            DO NOT close or merge PRs.

            Address the review feedback:
            1. Read the review comments and understand what changes are requested.
            2. Make the requested changes with clear, focused commits.
            3. Reply to each resolved comment with a brief note.
            4. If stuck, leave a comment explaining what you tried.
