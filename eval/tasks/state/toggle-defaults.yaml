name: toggle-defaults
description: >
  Read a UserDefaults value, toggle it, and verify the UI responds.
  Tests defaults read/write cycle with observation.
requires_simulator: true
deploy_test_app: true

goal: |
  1. Use look to observe the current screen state.
  2. Use defaults to list or read current UserDefaults values.
  3. Pick a boolean default and toggle it (true->false or false->true).
  4. Use look to verify the UI changed in response.
  Report the key name, old value, new value, and what changed on screen.

success:
  pepper_tools_called: [look, defaults]
  min_look_calls: 2

anti_patterns:
  - name: no-look-before-mutate
    rule: look_before_act < 1.0
  - name: blind-mutation
    rule: consecutive_actions > 1

budget_usd: 0.25
timeout_s: 120
tags: [state, defaults, quick]
