name: debug-network-request
description: >
  Start network monitoring, trigger a request, and inspect the result.
  Tests network tool workflow: start -> trigger -> log -> analyze.
requires_simulator: true
deploy_test_app: true

goal: |
  You are connected to PepperTestApp running in the iOS simulator.
  Your task:
  1. Start network monitoring
  2. Navigate to the Misc tab
  3. Find and trigger the HTTP fetch button
  4. Check the network log for the request
  5. Report: URL, method, status code, and response size

  Use Pepper MCP tools: network (start/log), look, tap, navigate.

success:
  pepper_tools_called: [network, look, tap]
  output_contains: ["http", "status"]

anti_patterns:
  - name: forgot-network-start
    description: Must start network monitoring before triggering request
  - name: no-look-before-tap
    rule: look_before_act < 1.0
  - name: excessive-tool-calls
    rule: tool_call_count > 25

budget_usd: 0.35
timeout_s: 180
tags: [debugging, network, simulator]
