name: voiceover-actions
description: >
  Discover and invoke VoiceOver custom actions on interactive elements.
  Tests accessibility action tooling without needing VoiceOver enabled.
requires_simulator: true
deploy_test_app: true

goal: |
  1. Use look to observe the current screen and identify interactive elements.
  2. Use accessibility_action with action=list to discover available
     custom actions on at least one element.
  3. Invoke a custom action (e.g. magic_tap, increment, decrement) on an element.
  4. Use look to verify the action had an effect.
  Report: which elements have custom actions, what actions are available,
  and what happened when you invoked one.

success:
  pepper_tools_called: [look, accessibility_action]
  min_look_calls: 2

anti_patterns:
  - name: no-look-before-action
    rule: look_before_act < 1.0
  - name: blind-action
    rule: consecutive_actions > 1

budget_usd: 0.25
timeout_s: 120
tags: [accessibility, voiceover, quick]
