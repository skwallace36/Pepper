name: read-crash-log
description: >
  Fetch and analyze recent crash reports. Tests diagnostic tool usage
  without requiring the app to actually crash.
requires_simulator: true
deploy_test_app: true

goal: |
  1. Use look to confirm the app is running.
  2. Use crash_log to fetch recent crash reports.
  3. Use console to capture recent app logs for additional context.
  4. If crash logs exist, analyze the stack trace and identify:
     - The crashing thread
     - The exception type
     - The likely root cause
  5. If no crash logs exist, report that and summarize any notable console output.

success:
  pepper_tools_called: [look, crash_log]
  min_look_calls: 1

anti_patterns:
  - name: no-look-first
    rule: look_before_act < 1.0

budget_usd: 0.25
timeout_s: 120
tags: [debug, crash, quick]
