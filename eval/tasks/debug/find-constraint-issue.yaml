name: find-constraint-issue
description: >
  Inspect AutoLayout constraints on the current screen and identify
  any ambiguous or conflicting layouts. Tests constraint debugging tools.
requires_simulator: true
deploy_test_app: true

goal: |
  1. Use look to observe the current screen.
  2. Use constraints to dump AutoLayout constraints.
  3. Identify any ambiguous layouts, conflicting constraints, or
     unsatisfiable constraint warnings.
  4. Use find to locate the specific views involved in any issues.
  5. Report: which views have constraint issues, what the conflicts are,
     and suggested fixes. If no issues found, report the constraint health.

success:
  pepper_tools_called: [look, constraints]
  min_look_calls: 1

anti_patterns:
  - name: no-look-first
    rule: look_before_act < 1.0

budget_usd: 0.25
timeout_s: 120
tags: [debug, constraints, quick]
