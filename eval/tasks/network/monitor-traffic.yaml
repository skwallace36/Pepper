name: monitor-traffic
description: >
  Start network monitoring, trigger a request by interacting with the app,
  then inspect the captured traffic. Tests network observe workflow.
requires_simulator: true
deploy_test_app: true

goal: |
  1. Use look to observe the current screen.
  2. Use network with action=start to begin monitoring HTTP traffic.
  3. Interact with the app (tap a button or navigate) to trigger a network request.
  4. Use network with action=log to see captured requests.
  Report: URL, method, status code, and response size of each captured request.

success:
  pepper_tools_called: [look, network, tap]
  min_look_calls: 1

anti_patterns:
  - name: no-look-before-interact
    rule: look_before_act < 1.0
  - name: excessive-consecutive-actions
    rule: consecutive_actions > 2

budget_usd: 0.25
timeout_s: 120
tags: [network, monitoring, quick]
