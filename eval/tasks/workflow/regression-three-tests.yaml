name: regression-three-tests
agent_type: regression-tester
description: >
  Run exactly 3 regression test cases from the test plan. Tests the
  regression-tester's ability to follow a structured test plan and
  report results per-case.
requires_simulator: true
deploy_test_app: true

goal: |
  Run the first 3 tests from test-app/regression-tests.yaml.
  For each test:

  1. Read the test case to understand what to check.
  2. Use look to observe the starting screen state.
  3. Perform the test steps (navigate, tap, scroll as needed).
  4. Use look to verify the expected outcome.
  5. Record pass or fail with evidence.

  After all 3 tests, report a summary table:
  | Test | Result | Notes |

success:
  pepper_tools_called: [look, tap]
  min_look_calls: 4
  output_contains: ["pass", "fail"]

anti_patterns:
  - name: no-look-before-tap
    rule: look_before_act < 1.0
  - name: excessive-consecutive-actions
    rule: consecutive_actions > 2

budget_usd: 0.75
timeout_s: 300
tags: [workflow, regression-tester, medium]
