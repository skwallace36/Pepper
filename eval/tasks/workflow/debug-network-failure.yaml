name: debug-network-failure
agent_type: bugfix
description: >
  Diagnose why a network request fails. Requires combining network
  monitoring, console logs, and UI observation to identify root cause.
requires_simulator: true
deploy_test_app: true

goal: |
  A user reports that "data doesn't load on the main screen."
  Investigate the issue:

  1. Use look to observe the current screen state.
  2. Use network with action=start to begin monitoring.
  3. Use console with action=start to capture logs.
  4. Trigger the data load (tap refresh, navigate, or scroll).
  5. Use network with action=log to inspect HTTP traffic.
  6. Use console with action=log to check for error messages.
  7. Use look to see how the UI responded.

  Report your diagnosis:
  - What network requests were made (URL, method, status)?
  - Were there errors in console?
  - What's the likely root cause?
  - What would you change to fix it?

success:
  pepper_tools_called: [look, network, console]
  min_look_calls: 2

anti_patterns:
  - name: no-look-first
    rule: look_before_act < 1.0
  - name: excessive-consecutive-actions
    rule: consecutive_actions > 2

budget_usd: 0.50
timeout_s: 180
tags: [workflow, bugfix, network, medium]
