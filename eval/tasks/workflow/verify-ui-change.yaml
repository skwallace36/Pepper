name: verify-ui-change
agent_type: pr-verifier
description: >
  Navigate to a specific screen, observe its state, and verify it matches
  expected behavior. Simulates the core pr-verifier workflow of testing
  a UI change against a test plan.
requires_simulator: true
deploy_test_app: true

goal: |
  You are verifying that a UI change works correctly. The test plan:

  1. Navigate to the detail screen (use navigate or tap from the list).
  2. Verify the screen title is visible using look.
  3. Verify at least one interactive element (button, toggle, or text field) exists.
  4. Interact with that element (tap, toggle, or input).
  5. Verify the interaction had an effect (UI changed, value updated, navigation occurred).
  6. Go back to the previous screen using back.
  7. Verify you returned successfully.

  Report pass/fail for each step with brief evidence.

success:
  pepper_tools_called: [look, tap, back]
  min_look_calls: 3
  output_contains: ["pass", "fail"]

anti_patterns:
  - name: no-look-before-tap
    rule: look_before_act < 1.0
  - name: excessive-consecutive-actions
    rule: consecutive_actions > 2

budget_usd: 0.50
timeout_s: 180
tags: [workflow, pr-verifier, medium]
