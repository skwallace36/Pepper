name: performance-check
agent_type: tester
description: >
  Measure scrolling performance and check for UI hitches.
  Tests the performance profiling workflow.
requires_simulator: true
deploy_test_app: true

goal: |
  Check the app's scrolling performance:

  1. Use look to find a scrollable list screen.
  2. Navigate to it if needed.
  3. Use perf with action=fps to start FPS monitoring.
  4. Scroll through the list several times (at least 3 scroll actions).
  5. Use look between scrolls to observe the content.
  6. Use perf to read the FPS results.
  7. Use animations to check for any running animations that might affect performance.

  Report:
  - Average FPS during scrolling
  - Any dropped frames or hitches detected
  - Whether performance is acceptable (>55 FPS = good, 45-55 = warning, <45 = bad)

success:
  pepper_tools_called: [look, perf, scroll]
  min_look_calls: 2

anti_patterns:
  - name: no-look-before-scroll
    rule: look_before_act < 1.0
  - name: blind-scrolling
    rule: consecutive_actions > 3

budget_usd: 0.50
timeout_s: 180
tags: [workflow, tester, performance, medium]
