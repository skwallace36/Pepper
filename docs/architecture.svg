<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#111">Pepper — Architecture</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- iOS Simulator box -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="65" width="380" height="400" rx="12" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="30" y="65" width="380" height="32" rx="12" fill="#e5e7eb"/>
  <rect x="30" y="85" width="380" height="12" fill="#e5e7eb"/>
  <text x="220" y="87" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">iOS Simulator</text>

  <!-- App process box -->
  <rect x="55" y="112" width="330" height="325" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="220" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Target App Process</text>

  <!-- DYLD injection label (top of app) -->
  <rect x="90" y="145" width="260" height="42" rx="7" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="220" y="161" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Pepper.dylib</text>
  <text x="220" y="178" text-anchor="middle" font-size="9.5" fill="#3b82f6">injected via DYLD_INSERT_LIBRARIES</text>

  <!-- WebSocket server box -->
  <rect x="90" y="208" width="260" height="56" rx="7" fill="#fff" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="220" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">WebSocket Server</text>
  <text x="220" y="245" text-anchor="middle" font-size="10" fill="#374151">ws://localhost:8769</text>
  <text x="220" y="258" text-anchor="middle" font-size="9" fill="#6b7280">runs inside app process</text>

  <!-- Capabilities box -->
  <rect x="90" y="285" width="260" height="130" rx="7" fill="#fafafa" stroke="#d1d5db" stroke-width="1"/>
  <text x="220" y="303" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">In-Process Capabilities</text>
  <!-- capability items -->
  <text x="110" y="320" font-size="9.5" fill="#4b5563">● Heap inspection &amp; object graph</text>
  <text x="110" y="336" font-size="9.5" fill="#4b5563">● View hierarchy (UIKit + SwiftUI)</text>
  <text x="110" y="352" font-size="9.5" fill="#4b5563">● HID event injection (taps, swipes)</text>
  <text x="110" y="368" font-size="9.5" fill="#4b5563">● Network interception</text>
  <text x="110" y="384" font-size="9.5" fill="#4b5563">● Console &amp; crash logs</text>
  <text x="110" y="400" font-size="9.5" fill="#4b5563">● UserDefaults / Keychain / flags</text>

  <!-- Arrow: dylib → WebSocket -->
  <line x1="220" y1="187" x2="220" y2="207" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: WebSocket → capabilities -->
  <line x1="220" y1="264" x2="220" y2="284" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- pepper-mcp bridge box -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="470" y="170" width="200" height="90" rx="10" fill="#fff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="570" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">pepper-mcp</text>
  <text x="570" y="211" text-anchor="middle" font-size="9.5" fill="#374151">Python bridge process</text>
  <text x="570" y="228" text-anchor="middle" font-size="9.5" fill="#6b7280">WebSocket client ↔ MCP stdio</text>
  <text x="570" y="244" text-anchor="middle" font-size="9" fill="#7c3aed">30+ tools exposed via MCP</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- AI Tool box -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="470" y="310" width="200" height="70" rx="10" fill="#fff" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="570" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Claude Code / Cursor</text>
  <text x="570" y="352" text-anchor="middle" font-size="9.5" fill="#374151">MCP client</text>
  <text x="570" y="368" text-anchor="middle" font-size="9" fill="#6b7280">calls tools: look, tap, heap, …</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Connecting arrows -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- WebSocket connection: simulator ↔ pepper-mcp -->
  <line x1="410" y1="236" x2="469" y2="215" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue)"/>
  <rect x="415" y="195" width="52" height="26" rx="4" fill="#eff6ff"/>
  <text x="441" y="207" text-anchor="middle" font-size="9" fill="#1d4ed8" font-weight="600">WebSocket</text>
  <text x="441" y="218" text-anchor="middle" font-size="8.5" fill="#3b82f6">JSON-RPC</text>

  <!-- MCP connection: pepper-mcp ↔ Claude Code -->
  <line x1="570" y1="260" x2="570" y2="309" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue)"/>
  <rect x="583" y="272" width="44" height="24" rx="4" fill="#f5f3ff"/>
  <text x="605" y="283" text-anchor="middle" font-size="9" fill="#5b21b6" font-weight="600">MCP</text>
  <text x="605" y="293" text-anchor="middle" font-size="8.5" fill="#7c3aed">stdio</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- pepper-ctl CLI box -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="695" y="170" width="135" height="55" rx="10" fill="#fff" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="762" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">pepper-ctl</text>
  <text x="762" y="208" text-anchor="middle" font-size="9.5" fill="#374151">CLI / shell scripts</text>
  <text x="762" y="221" text-anchor="middle" font-size="8.5" fill="#6b7280">direct WebSocket</text>

  <!-- CLI connection to WebSocket server -->
  <line x1="695" y1="197" x2="680" y2="197" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Legend / footnote -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="430" y="470" text-anchor="middle" font-size="9" fill="#9ca3af">No source patches needed — injection happens at launch time via simulator environment variables</text>
</svg>
