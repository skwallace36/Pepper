# Pepper Regression Test Plan
# Run by the regression-tester agent after N commits.
# Each test: steps to execute, then verification.
# Tests are ordered by priority — run top-down, stop at budget.

# ── Core: if these fail, Pepper is broken ──

- name: pepper connects
  priority: critical
  steps:
    - tool: status
  verify: status returns bundle_id and websocket connected

- name: look returns elements
  priority: critical
  steps:
    - tool: look
  verify: output contains at least 3 interactive elements

- name: tap by text
  priority: critical
  steps:
    - tool: look
    - tool: tap
      params: { text: "Settings" }  # adapt to test app
  verify: screen state changed after tap

- name: tap by point
  priority: critical
  steps:
    - tool: look
    - note: pick center coordinates of any visible element
    - tool: tap
      params: { point: "<from look>" }
  verify: tap acknowledged, screen may change

- name: back navigation
  priority: critical
  steps:
    - tool: back
  verify: returned to previous screen

# ── Input ──

- name: input text into field
  priority: high
  steps:
    - note: navigate to a screen with a text field
    - tool: tap
      params: { text: "<text field label>" }
    - tool: input_text
      params: { value: "test input 123" }
    - tool: look
  verify: text field contains "test input 123"

- name: dismiss keyboard
  priority: high
  steps:
    - tool: dismiss_keyboard
    - tool: look
  verify: keyboard no longer visible (if keyboard indicator exists)

# ── Scrolling ──

- name: scroll down
  priority: high
  steps:
    - note: navigate to a scrollable screen
    - tool: look
    - tool: scroll
      params: { direction: "down" }
  verify: screen content shifted, new elements visible

- name: scroll to element
  priority: high
  steps:
    - tool: scroll
      params: { target: "<off-screen element>", direction: "down" }
  verify: target element now visible in look output

# ── Observation ──

- name: look scope filtering
  priority: high
  steps:
    - tool: look
      params: { scope: "<container label>" }
  verify: output only contains elements within that container

- name: look compact mode
  priority: high
  steps:
    - tool: look
      params: { compact: true }
    - tool: look
      params: { compact: true }
  verify: second call returns diff, not full output

- name: find by predicate
  priority: high
  steps:
    - tool: find
      params: { predicate: "type == 'button'" }
  verify: returns only button elements

- name: read element properties
  priority: medium
  steps:
    - tool: look
    - tool: read_element
      params: { element: "<element from look>" }
  verify: returns detailed properties (frame, traits, value, etc.)

# ── Screen management ──

- name: screen name
  priority: medium
  steps:
    - tool: screen
  verify: returns current screen/VC name

- name: appearance toggle
  priority: medium
  steps:
    - tool: appearance
      params: { mode: "dark" }
    - tool: look
    - tool: appearance
      params: { mode: "light" }
  verify: no crash, mode switches cleanly

# ── Monitoring ──

- name: network monitoring
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - note: trigger a network request (navigate to a screen that loads data)
    - tool: network
      params: { action: "log" }
    - tool: network
      params: { action: "stop" }
  verify: at least 1 request captured with URL and status

- name: network simulate latency
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "latency", latency_ms: 2000 }
    - note: tap "Timed Request" button on MiscTab (slow_request_button)
    - tool: tap
      params: { id: "slow_request_button" }
    - tool: wait_for
      params: { id: "network_elapsed", timeout: 10 }
    - tool: read_element
      params: { id: "network_elapsed" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: elapsed time label shows >= 2000ms, confirming latency was injected

- name: network simulate fail_status
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "fail_status", status_code: 500 }
    - tool: tap
      params: { id: "error_request_button" }
    - tool: wait_for
      params: { id: "network_status_code", timeout: 10 }
    - tool: read_element
      params: { id: "network_status_code" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: network_status_code label shows "HTTP 500"

- name: network simulate fail_error
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "fail_error", error_domain: "NSURLErrorDomain", error_code: -1009 }
    - tool: tap
      params: { id: "error_request_button" }
    - tool: wait_for
      params: { id: "network_error", timeout: 10 }
    - tool: read_element
      params: { id: "network_error" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: network_error label shows NSURLErrorDomain/-1009

- name: network simulate throttle
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "throttle", bytes_per_second: 256 }
    - tool: tap
      params: { id: "slow_request_button" }
    - tool: wait_for
      params: { id: "network_elapsed", timeout: 30 }
    - tool: read_element
      params: { id: "network_elapsed" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: elapsed time significantly higher than unthrottled baseline (~1s)

- name: network simulate offline
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "offline" }
    - tool: tap
      params: { id: "offline_request_button" }
    - tool: wait_for
      params: { id: "network_error", timeout: 10 }
    - tool: read_element
      params: { id: "network_error" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: network_error label shows offline-related NSError

- name: network simulate presets
  priority: medium
  steps:
    - tool: network
      params: { action: "presets" }
  verify: returns list of named presets (3G, Edge, LTE, WiFi, High Latency DNS, 100% Loss)

- name: network conditions lifecycle
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "latency", latency_ms: 100, id: "test-cond-1" }
    - tool: network
      params: { action: "conditions" }
    - note: verify test-cond-1 appears in active conditions list
    - tool: network
      params: { action: "remove_condition", id: "test-cond-1" }
    - tool: network
      params: { action: "conditions" }
    - note: verify conditions list is now empty
    - tool: network
      params: { action: "simulate", effect: "offline", id: "test-cond-2" }
    - tool: network
      params: { action: "simulate", effect: "latency", latency_ms: 500, id: "test-cond-3" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "conditions" }
    - tool: network
      params: { action: "stop" }
  verify: conditions list shows entries after simulate, empty after remove/clear

- name: network mock lifecycle
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "mock", url: "pepper.test/mock", status: 200, body: '{"mocked":true}' }
    - tool: network
      params: { action: "mocks" }
    - note: verify mock entry for pepper.test/mock appears
    - tool: tap
      params: { id: "mock_request_button" }
    - tool: wait_for
      params: { id: "network_body_preview", timeout: 10 }
    - tool: read_element
      params: { id: "network_body_preview" }
    - note: verify body preview shows mocked content
    - tool: network
      params: { action: "mocks" }
    - note: get mock id from list
    - tool: network
      params: { action: "remove_mock", id: "<mock_id from mocks list>" }
    - tool: network
      params: { action: "mocks" }
    - note: verify mocks list is empty
    - tool: network
      params: { action: "stop" }
  verify: mock_request_button returns mocked body, mocks list shows/removes entries correctly

- name: network clear mocks
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "mock", url: "pepper.test/mock", status: 201, body: '{"a":1}' }
    - tool: network
      params: { action: "mock", url: "example.com/other", status: 404, body: '{"b":2}' }
    - tool: network
      params: { action: "mocks" }
    - note: verify 2 mocks active
    - tool: network
      params: { action: "clear_mocks" }
    - tool: network
      params: { action: "mocks" }
    - tool: network
      params: { action: "stop" }
  verify: mocks count goes from 2 to 0 after clear_mocks

- name: network websocket log and status
  priority: low
  steps:
    - tool: network
      params: { action: "start" }
    - note: navigate to WebSocket Client screen and connect
    - tool: tap
      params: { text: "WebSocket Client" }
    - tool: tap
      params: { id: "websocket_connect_button" }
    - tool: wait_for
      params: { id: "websocket_status_label", text: "connected", timeout: 10 }
    - tool: network
      params: { action: "ws_status" }
    - note: verify active connections count >= 1
    - tool: network
      params: { action: "ws_log" }
    - tool: network
      params: { action: "ws_clear" }
    - tool: network
      params: { action: "ws_log" }
    - tool: tap
      params: { id: "websocket_disconnect_button" }
    - tool: back
    - tool: network
      params: { action: "stop" }
  verify: ws_status shows active connection, ws_log returns frames, ws_clear empties buffer

- name: console capture
  priority: medium
  steps:
    - tool: console
      params: { action: "start" }
    - note: trigger some app activity
    - tool: console
      params: { action: "log" }
    - tool: console
      params: { action: "stop" }
  verify: captured log lines from the app

- name: timeline flight recorder
  priority: medium
  steps:
    - tool: timeline
      params: { action: "query", last_seconds: 30 }
  verify: returns recent events (screen transitions, commands)

# ── State inspection ──

- name: vars inspect
  priority: medium
  steps:
    - tool: vars_inspect
      params: { action: "list" }
  verify: returns registered var bindings (may be empty in generic mode)

- name: defaults read
  priority: medium
  steps:
    - tool: defaults
      params: { action: "list" }
  verify: returns UserDefaults keys

- name: snapshot save and diff
  priority: medium
  steps:
    - tool: snapshot
      params: { action: "save", name: "regression_baseline" }
    - note: make a small UI change
    - tool: snapshot
      params: { action: "diff", name: "regression_baseline" }
  verify: diff shows the change

# ── Accessibility ──

- name: accessibility audit
  priority: low
  steps:
    - tool: accessibility_audit
  verify: returns audit results (may have issues, that's ok — just shouldn't crash)

- name: tree dump
  priority: low
  steps:
    - tool: tree
  verify: returns view hierarchy

# ── Edge cases ──

- name: look on empty screen
  priority: low
  steps:
    - note: if possible, navigate to a minimal screen
    - tool: look
  verify: returns without error, even if few elements

- name: tap nonexistent element
  priority: low
  steps:
    - tool: tap
      params: { text: "THIS_ELEMENT_DOES_NOT_EXIST_12345" }
  verify: returns clear "not found" error, not a crash
