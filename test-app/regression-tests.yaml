# Pepper Regression Test Plan
# Run by the regression-tester agent after N commits.
# Each test: steps to execute, then verification.
# Tests are ordered by priority — run top-down, stop at budget.

# ── Reliability: call `test reset` between unrelated test sections ──
# See test-app/TEST-RELIABILITY.md for timeout and retry guidance.

# ── Core: if these fail, Pepper is broken ──

- name: pepper connects
  priority: critical
  steps:
    - tool: status
  verify: status returns bundle_id and websocket connected

- name: look returns elements
  priority: critical
  steps:
    - tool: look
  verify: output contains at least 3 interactive elements

- name: tap by text
  priority: critical
  steps:
    - tool: look
    - tool: tap
      params: { text: "Settings" }  # adapt to test app
  verify: screen state changed after tap

- name: tap by point
  priority: critical
  steps:
    - tool: look
    - note: pick center coordinates of any visible element
    - tool: tap
      params: { point: "<from look>" }
  verify: tap acknowledged, screen may change

- name: back navigation
  priority: critical
  steps:
    - tool: back
  verify: returned to previous screen

# ── Input ──

- name: input text into field
  priority: high
  steps:
    - note: navigate to a screen with a text field
    - tool: tap
      params: { text: "<text field label>" }
    - tool: input_text
      params: { value: "test input 123" }
    - tool: look
  verify: text field contains "test input 123"

- name: dismiss keyboard
  priority: high
  steps:
    - tool: dismiss_keyboard
    - tool: look
  verify: keyboard no longer visible (if keyboard indicator exists)

# ── Scrolling ──

- name: scroll down
  priority: high
  steps:
    - note: navigate to a scrollable screen
    - tool: look
    - tool: scroll
      params: { direction: "down" }
  verify: screen content shifted, new elements visible

- name: scroll to element
  priority: high
  steps:
    - tool: scroll
      params: { target: "<off-screen element>", direction: "down" }
  verify: target element now visible in look output

# ── Observation ──

- name: look scope filtering
  priority: high
  steps:
    - tool: look
      params: { scope: "<container label>" }
  verify: output only contains elements within that container

- name: look compact mode
  priority: high
  steps:
    - tool: look
      params: { compact: true }
    - tool: look
      params: { compact: true }
  verify: second call returns diff, not full output

- name: find by predicate
  priority: high
  steps:
    - tool: find
      params: { predicate: "type == 'button'" }
  verify: returns only button elements

- name: read element properties
  priority: medium
  steps:
    - tool: look
    - tool: read_element
      params: { element: "<element from look>" }
  verify: returns detailed properties (frame, traits, value, etc.)

# ── Screen management ──

- name: screen name
  priority: medium
  steps:
    - tool: screen
  verify: returns current screen/VC name

- name: appearance toggle
  priority: medium
  steps:
    - tool: appearance
      params: { mode: "dark" }
    - tool: look
    - tool: appearance
      params: { mode: "light" }
  verify: no crash, mode switches cleanly

# ── Monitoring ──

- name: network monitoring
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - note: trigger a network request (navigate to a screen that loads data)
    - tool: network
      params: { action: "log" }
    - tool: network
      params: { action: "stop" }
  verify: at least 1 request captured with URL and status

- name: network simulate latency
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "latency", latency_ms: 2000 }
    - note: tap "Timed Request" button on MiscTab (slow_request_button)
    - tool: tap
      params: { id: "slow_request_button" }
    - tool: wait_for
      params: { id: "network_elapsed", timeout: 10 }
    - tool: read_element
      params: { id: "network_elapsed" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: elapsed time label shows >= 2000ms, confirming latency was injected

- name: network simulate fail_status
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "fail_status", status_code: 500 }
    - tool: tap
      params: { id: "error_request_button" }
    - tool: wait_for
      params: { id: "network_status_code", timeout: 10 }
    - tool: read_element
      params: { id: "network_status_code" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: network_status_code label shows "HTTP 500"

- name: network simulate fail_error
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "fail_error", error_domain: "NSURLErrorDomain", error_code: -1009 }
    - tool: tap
      params: { id: "error_request_button" }
    - tool: wait_for
      params: { id: "network_error", timeout: 10 }
    - tool: read_element
      params: { id: "network_error" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: network_error label shows NSURLErrorDomain/-1009

- name: network simulate throttle
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "throttle", bytes_per_second: 256 }
    - tool: tap
      params: { id: "slow_request_button" }
    - tool: wait_for
      params: { id: "network_elapsed", timeout: 30 }
    - tool: read_element
      params: { id: "network_elapsed" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: elapsed time significantly higher than unthrottled baseline (~1s)

- name: network simulate offline
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "offline" }
    - tool: tap
      params: { id: "offline_request_button" }
    - tool: wait_for
      params: { id: "network_error", timeout: 10 }
    - tool: read_element
      params: { id: "network_error" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "stop" }
  verify: network_error label shows offline-related NSError

- name: network simulate presets
  priority: medium
  steps:
    - tool: network
      params: { action: "presets" }
  verify: returns list of named presets (3G, Edge, LTE, WiFi, High Latency DNS, 100% Loss)

- name: network conditions lifecycle
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "simulate", effect: "latency", latency_ms: 100, id: "test-cond-1" }
    - tool: network
      params: { action: "conditions" }
    - note: verify test-cond-1 appears in active conditions list
    - tool: network
      params: { action: "remove_condition", id: "test-cond-1" }
    - tool: network
      params: { action: "conditions" }
    - note: verify conditions list is now empty
    - tool: network
      params: { action: "simulate", effect: "offline", id: "test-cond-2" }
    - tool: network
      params: { action: "simulate", effect: "latency", latency_ms: 500, id: "test-cond-3" }
    - tool: network
      params: { action: "clear_conditions" }
    - tool: network
      params: { action: "conditions" }
    - tool: network
      params: { action: "stop" }
  verify: conditions list shows entries after simulate, empty after remove/clear

- name: network mock lifecycle
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "mock", url: "pepper.test/mock", status: 200, body: '{"mocked":true}' }
    - tool: network
      params: { action: "mocks" }
    - note: verify mock entry for pepper.test/mock appears
    - tool: tap
      params: { id: "mock_request_button" }
    - tool: wait_for
      params: { id: "network_body_preview", timeout: 10 }
    - tool: read_element
      params: { id: "network_body_preview" }
    - note: verify body preview shows mocked content
    - tool: network
      params: { action: "mocks" }
    - note: get mock id from list
    - tool: network
      params: { action: "remove_mock", id: "<mock_id from mocks list>" }
    - tool: network
      params: { action: "mocks" }
    - note: verify mocks list is empty
    - tool: network
      params: { action: "stop" }
  verify: mock_request_button returns mocked body, mocks list shows/removes entries correctly

- name: network clear mocks
  priority: medium
  steps:
    - tool: network
      params: { action: "start" }
    - tool: network
      params: { action: "mock", url: "pepper.test/mock", status: 201, body: '{"a":1}' }
    - tool: network
      params: { action: "mock", url: "example.com/other", status: 404, body: '{"b":2}' }
    - tool: network
      params: { action: "mocks" }
    - note: verify 2 mocks active
    - tool: network
      params: { action: "clear_mocks" }
    - tool: network
      params: { action: "mocks" }
    - tool: network
      params: { action: "stop" }
  verify: mocks count goes from 2 to 0 after clear_mocks

- name: network websocket log and status
  priority: low
  steps:
    - tool: network
      params: { action: "start" }
    - note: navigate to WebSocket Client screen and connect
    - tool: tap
      params: { text: "WebSocket Client" }
    - tool: tap
      params: { id: "websocket_connect_button" }
    - tool: wait_for
      params: { id: "websocket_status_label", text: "connected", timeout: 10 }
    - tool: network
      params: { action: "ws_status" }
    - note: verify active connections count >= 1
    - tool: network
      params: { action: "ws_log" }
    - tool: network
      params: { action: "ws_clear" }
    - tool: network
      params: { action: "ws_log" }
    - tool: tap
      params: { id: "websocket_disconnect_button" }
    - tool: back
    - tool: network
      params: { action: "stop" }
  verify: ws_status shows active connection, ws_log returns frames, ws_clear empties buffer

- name: console capture
  priority: medium
  steps:
    - tool: console
      params: { action: "start" }
    - note: trigger some app activity
    - tool: console
      params: { action: "log" }
    - tool: console
      params: { action: "stop" }
  verify: captured log lines from the app

- name: timeline flight recorder
  priority: medium
  steps:
    - tool: timeline
      params: { action: "query", last_seconds: 30 }
  verify: returns recent events (screen transitions, commands)

# ── State inspection ──

- name: vars inspect
  priority: medium
  steps:
    - tool: vars_inspect
      params: { action: "list" }
  verify: returns registered var bindings (may be empty in generic mode)

- name: defaults read
  priority: medium
  steps:
    - tool: defaults
      params: { action: "list" }
  verify: returns UserDefaults keys

- name: snapshot full lifecycle
  priority: medium
  surface: MiscTab > Snapshot Test Screen
  steps:
    - tool: navigate
      params: { screen: "MiscTab" }
    - tool: scroll
      params: { direction: "down", amount: 1500 }
    - tool: tap
      params: { id: "snapshot_test_link" }
    - tool: snapshot
      params: { action: "save", name: "lifecycle_test" }
    - tool: snapshot
      params: { action: "list" }
    - tool: snapshot
      params: { action: "diff", name: "lifecycle_test" }
    - note: diff with no changes should report has_changes=false
    - tool: tap
      params: { text: "Increment" }
    - tool: snapshot
      params: { action: "diff", name: "lifecycle_test" }
    - note: diff after increment should report has_changes=true with changed elements
    - tool: snapshot
      params: { action: "delete", name: "lifecycle_test" }
    - tool: snapshot
      params: { action: "list" }
    - note: lifecycle_test should no longer appear in list
  verify: >
    save returns element_count > 0; list includes lifecycle_test;
    diff with no changes has has_changes=false; diff after increment has has_changes=true
    with changed elements; delete succeeds; list no longer includes lifecycle_test

- name: snapshot clear
  priority: medium
  surface: MiscTab > Snapshot Test Screen
  steps:
    - tool: snapshot
      params: { action: "save", name: "clear_test_1" }
    - tool: snapshot
      params: { action: "save", name: "clear_test_2" }
    - tool: snapshot
      params: { action: "list" }
    - tool: snapshot
      params: { action: "clear" }
    - tool: snapshot
      params: { action: "list" }
  verify: list shows both snapshots before clear; list shows none after clear

- name: snapshot assert_no_diff
  priority: medium
  surface: MiscTab > Snapshot Test Screen
  steps:
    - tool: navigate
      params: { screen: "MiscTab" }
    - tool: scroll
      params: { direction: "down", amount: 1500 }
    - tool: tap
      params: { id: "snapshot_test_link" }
    - tool: snapshot
      params: { action: "save", name: "assert_test" }
    - tool: snapshot
      params: { action: "diff", name: "assert_test", assert_no_diff: true }
    - note: should succeed with no error since nothing changed
    - tool: tap
      params: { text: "Increment" }
    - tool: snapshot
      params: { action: "diff", name: "assert_test", assert_no_diff: true }
    - note: should return error because screen state changed
    - tool: snapshot
      params: { action: "clear" }
  verify: >
    assert_no_diff with no changes succeeds; assert_no_diff after mutation
    returns an error indicating differences were detected

- name: snapshot ignore_transient
  priority: medium
  surface: MiscTab > Snapshot Test Screen
  steps:
    - tool: navigate
      params: { screen: "MiscTab" }
    - tool: scroll
      params: { direction: "down", amount: 1500 }
    - tool: tap
      params: { id: "snapshot_test_link" }
    - tool: snapshot
      params: { action: "save", name: "transient_test" }
    - tool: snapshot
      params: { action: "diff", name: "transient_test", ignore_transient: true }
    - tool: snapshot
      params: { action: "clear" }
  verify: diff with ignore_transient=true succeeds and filters transient elements

- name: diff start and show
  priority: medium
  surface: MiscTab > Snapshot Test Screen
  steps:
    - tool: navigate
      params: { screen: "MiscTab" }
    - tool: scroll
      params: { direction: "down", amount: 1500 }
    - tool: tap
      params: { id: "snapshot_test_link" }
    - tool: diff
      params: { action: "start" }
    - tool: diff
      params: { action: "show" }
    - note: show with no changes should report has_changes=false
    - tool: tap
      params: { text: "Increment" }
    - tool: diff
      params: { action: "show" }
    - note: show after increment should report has_changes=true
    - tool: diff
      params: { action: "clear" }
  verify: >
    start captures baseline with element_count > 0; show with no changes has
    has_changes=false; show after increment has has_changes=true; clear succeeds

# ── Accessibility ──

- name: accessibility audit
  priority: low
  steps:
    - tool: accessibility_audit
  verify: returns audit results (may have issues, that's ok — just shouldn't crash)

- name: tree dump
  priority: low
  steps:
    - tool: tree
  verify: returns view hierarchy

# ── Edge cases ──

- name: look on empty screen
  priority: low
  steps:
    - note: if possible, navigate to a minimal screen
    - tool: look
  verify: returns without error, even if few elements

- name: tap nonexistent element
  priority: low
  steps:
    - tool: tap
      params: { text: "THIS_ELEMENT_DOES_NOT_EXIST_12345" }
  verify: returns clear "not found" error, not a crash

# ── Feature flags ──

- name: flags CRUD lifecycle
  priority: medium
  steps:
    - tool: flags
      params: { action: "list" }
    - tool: flags
      params: { action: "set", key: "test_flag_bool", value: true }
    - tool: flags
      params: { action: "get", key: "test_flag_bool" }
    - tool: flags
      params: { action: "set", key: "test_flag_string", value: "hello" }
    - tool: flags
      params: { action: "list" }
    - note: verify list shows 2 overrides (test_flag_bool, test_flag_string)
    - tool: flags
      params: { action: "clear", key: "test_flag_bool" }
    - tool: flags
      params: { action: "get", key: "test_flag_bool" }
    - note: verify has_override is false
    - tool: flags
      params: { action: "clear" }
    - tool: flags
      params: { action: "list" }
  verify: set stores values, get reads them, clear by key removes one, clear all removes all, list count matches

# ── Responder chain ──

- name: responder chain dump
  priority: medium
  steps:
    - tool: look
    - note: pick a button element from look output
    - tool: responder_chain
      params: { text: "Tap Me" }
  verify: response contains gesture_recognizers array, responder_chain with view and viewController entries, hit_test_path with is_hit_target marker

# ── Notifications ──

- name: notifications lifecycle
  priority: medium
  steps:
    - tool: notifications
      params: { action: "start" }
    - note: navigate to Misc tab notifications section
    - tool: tap
      params: { id: "register_observer_button" }
    - tool: notifications
      params: { action: "list" }
    - note: verify observer_count > 0
    - tool: notifications
      params: { action: "counts" }
    - note: verify PepperTestNotification appears
    - tool: tap
      params: { id: "post_notification_button" }
    - tool: notifications
      params: { action: "events" }
    - note: verify events include add and post entries
    - tool: notifications
      params: { action: "clear" }
    - tool: notifications
      params: { action: "status" }
    - note: verify observer_count and event_count are 0
    - tool: notifications
      params: { action: "stop" }
    - tool: notifications
      params: { action: "status" }
  verify: start enables tracking, list shows registered observer, counts shows notification name, events show timeline, clear resets, stop disables

# ── Heap snapshot check ──

- name: heap snapshot check
  priority: medium
  steps:
    - tool: heap_snapshot
      params: { action: "snapshot" }
    - note: wait a few seconds for warmup period to pass
    - tool: heap_snapshot
      params: { action: "check" }
  verify: returns leak_count, verdict, and severity classifications (high/medium/low counts)

# ── Retain Cycle test surface (heap verification) ──

- name: retain cycle surface exists on heap
  priority: medium
  steps:
    - tool: tap
      params: { text: "Misc" }
    - tool: scroll
      params: { direction: "down", amount: 1500 }
    - tool: tap
      params: { id: "retain_cycle_link" }
    - tool: look
    - tool: tap
      params: { id: "create_retain_cycle_button" }
    - tool: heap
      params: { action: "scan", class: "RetainCycleA" }
    - tool: heap
      params: { action: "scan", class: "RetainCycleB" }
  verify: heap scan finds at least 1 instance each of RetainCycleA and RetainCycleB after button tap

- name: retain cycle count increments
  priority: medium
  steps:
    - tool: tap
      params: { id: "create_retain_cycle_button" }
    - tool: read_element
      params: { id: "retain_cycle_count" }
  verify: retain_cycle_count text shows "Leaked pairs: 2" after second tap

# ── SwiftUI body tracking (slow body surface) ──

- name: swiftui body tracks slow view
  priority: medium
  steps:
    - tool: back
    - tool: scroll
      params: { direction: "down", amount: 1500 }
    - tool: tap
      params: { id: "slow_body_link" }
    - tool: look
    - tool: swiftui_body
      params: { action: "start" }
    - tool: tap
      params: { id: "trigger_rerender_button" }
    - tool: tap
      params: { id: "trigger_rerender_button" }
    - tool: swiftui_body
      params: { action: "log" }
    - tool: swiftui_body
      params: { action: "stop" }
  verify: log output contains SlowChildView entries with duration > 10us, confirming body_track detects slow views

- name: swiftui body counts per view type
  priority: medium
  steps:
    - tool: swiftui_body
      params: { action: "start" }
    - tool: tap
      params: { id: "trigger_rerender_button" }
    - tool: swiftui_body
      params: { action: "counts" }
    - tool: swiftui_body
      params: { action: "reset" }
  verify: counts include SlowChildView with count >= 1
