name: Agent Triggers

# This workflow doesn't RUN agents (they run locally on your Mac).
# It creates webhook notifications that your local machine can consume.
# For now, it just logs events. When we add a webhook receiver, it'll
# call the trigger script.

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

jobs:
  log-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Log event
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR: #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}"
            echo "TRIGGER: pr-opened"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "PR: #${{ github.event.pull_request.number }}"
            echo "TRIGGER: pr-reviewed"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            echo "PR: #${{ github.event.pull_request.number }}"
            echo "TRIGGER: pr-reviewed"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            echo "Issue: #${{ github.event.issue.number }} ${{ github.event.issue.title }}"
            if echo "${{ github.event.issue.title }}" | grep -qi "BUG-"; then
              echo "TRIGGER: bug-filed"
            fi
          fi
