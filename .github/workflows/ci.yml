name: CI — Build & Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install 'websockets>=14,<16'

      - name: Run CI
        run: |
          source .venv/bin/activate
          make ci

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: build/ci-results/
          retention-days: 14
