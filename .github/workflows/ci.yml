name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: make lint

      - name: Build dylib
        run: make build

      - name: Check Python syntax
        run: |
          python3 -m py_compile tools/pepper-mcp
          python3 -m py_compile tools/pepper-ctl
          python3 -m py_compile tools/pepper-stream
          python3 -m py_compile tools/pepper_common.py
          python3 -m py_compile tools/pepper_websocket.py
          python3 -m py_compile tools/pepper_ws_raw.py

      - name: Type check Python (pyright)
        run: npx --yes pyright

      - name: Lint Python (ruff)
        run: |
          pip install ruff --quiet
          ruff check tools/ scripts/gen-coverage.py

      - name: Check MCP tool coverage
        run: make check-tools

      - name: Verify no hardcoded paths
        run: |
          if grep -rn '/Users/' dylib/ tools/ scripts/ --include='*.swift' --include='*.py' --include='*.sh' 2>/dev/null | grep -v '.env.example' | grep -v 'test-client' | grep -v 'pepper_sessions' | head -5 | grep -q .; then
            echo "Hardcoded paths found!"
            exit 1
          fi

  smoke-generic:
    runs-on: macos-15
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generic-mode smoke tests
        run: ./scripts/ci.sh --suite scripts/smoke-generic.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generic-smoke-results
          path: build/ci-results/
