name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python3 -c "from pepper_ios import __version__; print(__version__)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION doesn't match package version $PKG_VERSION"
            exit 1
          fi

      - name: Build dylib
        run: bash tools/build-dylib.sh

      - name: Package framework
        run: cd build && zip -r Pepper.framework.zip Pepper.framework/

      - name: Create GitHub Release (private)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Pepper $GITHUB_REF_NAME" \
            --generate-notes \
            build/Pepper.framework.zip 2>/dev/null \
          || gh release upload "$GITHUB_REF_NAME" build/Pepper.framework.zip --clobber

      - name: Create GitHub Release (public)
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Wait for mirror to push the tag to public repo
          for i in 1 2 3 4 5; do
            if gh release create "$GITHUB_REF_NAME" \
              --repo skwallace36/Pepper \
              --title "Pepper $GITHUB_REF_NAME" \
              --generate-notes \
              build/Pepper.framework.zip 2>/dev/null; then
              echo "Public release created"
              exit 0
            fi
            echo "Waiting for mirror to push tag... (attempt $i)"
            sleep 30
          done
          echo "::warning::Could not create public release — mirror may not have pushed tag yet"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python3 -m venv /tmp/pypi-venv
          /tmp/pypi-venv/bin/pip install --quiet build twine
          /tmp/pypi-venv/bin/python -m build
          /tmp/pypi-venv/bin/twine upload dist/*
